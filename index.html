<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 24px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header .avatar {
      width: 36px;
      height: 36px;
      background: #e94560;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .chat-header h1 { font-size: 16px; font-weight: 600; }
    .chat-header p { font-size: 12px; opacity: 0.65; margin-top: 2px; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .message .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .message .icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .icon { background: #1a1a2e; color: #fff; }
    .message.assistant .icon { background: #e94560; color: #fff; }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #f0f2f5;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #aaa;
      gap: 8px;
      font-size: 15px;
    }

    .empty-state .big-icon { font-size: 40px; }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      min-height: 44px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #1a1a2e; }

    button#send {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: #1a1a2e;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    button#send:hover:not(:disabled) { background: #e94560; }
    button#send:active:not(:disabled) { transform: scale(0.94); }
    button#send:disabled { opacity: 0.45; cursor: not-allowed; }

    .error-bubble {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      align-self: center;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">✦</div>
      <div>
        <h1>Claude Haiku</h1>
        <p>Powered by Anthropic</p>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty">
        <div class="big-icon">💬</div>
        <span>Start a conversation</span>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="input"
        placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
        rows="1"
      ></textarea>
      <button id="send" title="Send">➤</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const emptyState = document.getElementById('empty');

    const history = [];
    let streaming = false;

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, text = '') {
      if (emptyState) emptyState.remove();

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = role === 'user' ? '👤' : '✦';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(icon);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return bubble;
    }

    function addTypingIndicator() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message assistant';
      wrapper.id = 'typing';

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = '✦';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';

      wrapper.appendChild(icon);
      wrapper.appendChild(indicator);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    function showError(msg) {
      const el = document.createElement('div');
      el.className = 'error-bubble';
      el.textContent = `⚠ ${msg}`;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || streaming) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      streaming = true;
      sendBtn.disabled = true;

      history.push({ role: 'user', content: text });
      addMessage('user', text);

      const typingEl = addTypingIndicator();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        typingEl.remove();
        const bubble = addMessage('assistant');
        let fullText = '';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') break;

            const data = JSON.parse(payload);
            if (data.error) throw new Error(data.error);
            if (data.text) {
              fullText += data.text;
              bubble.textContent = fullText;
              scrollToBottom();
            }
          }
        }

        history.push({ role: 'assistant', content: fullText });
      } catch (err) {
        typingEl.remove();
        showError(err.message || 'Something went wrong.');
        history.pop();
      } finally {
        streaming = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = `${Math.min(inputEl.scrollHeight, 120)}px`;
    });
  </script>
</body>
</html>
